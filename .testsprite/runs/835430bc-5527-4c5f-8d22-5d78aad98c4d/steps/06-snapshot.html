<html lang="es" data-theme="dark"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Isinet — Acceso Administración</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --surface: rgba(255,255,255,0.03);
      --surface-2: #111111;
      --text: #ffffff;
      --text-2: #a0a0a0;
      --text-4: #666666;
      --accent: #3B82F6;
      --accent-2: #22D3EE;
      --accent-glow: rgba(59, 130, 246, 0.3);
      --line: rgba(255,255,255,0.06);
      --error: #ef4444;
      --success: #22c55e;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Background mesh */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(circle 600px at 30% 40%, rgba(59,130,246,0.12) 0%, transparent 50%),
        radial-gradient(circle 500px at 70% 60%, rgba(34,211,238,0.08) 0%, transparent 50%);
      filter: blur(60px);
      animation: meshDrift 20s ease-in-out infinite alternate;
    }
    @keyframes meshDrift {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    /* Grain overlay */
    .grain {
      position: fixed; inset: 0; z-index: 1;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Login card */
    .login-wrapper {
      position: relative; z-index: 2;
      width: 100%; max-width: 440px;
      padding: 24px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      animation: cardIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Logo */
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px; height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 16px;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.3);
    }
    .login-logo-text {
      display: block;
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--text), var(--text-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-logo-sub {
      display: block;
      font-size: 0.85rem;
      color: var(--text-4);
      margin-top: 4px;
    }

    /* Title */
    .login-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      color: var(--text-2);
      margin-bottom: 32px;
    }

    /* Form */
    .login-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-2);
    }
    .form-input {
      padding: 14px 18px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder { color: var(--text-4); }

    /* Error */
    .form-error {
      display: none;
      padding: 12px 16px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      color: var(--error);
      font-size: 0.85rem;
      text-align: center;
    }

    /* Button */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 28px;
      font-family: var(--font-display);
      font-size: 0.95rem;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      position: relative;
      overflow: hidden;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #2563eb);
      color: #fff;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(59,130,246,0.4);
    }
    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-primary:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .btn-full { width: 100%; }

    .btn-loading-icon {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-check-icon {
      font-size: 1.2rem;
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 24px;
    }
    .login-footer a {
      color: var(--text-4);
      font-size: 0.85rem;
      text-decoration: none;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .login-footer a:hover { color: var(--accent); }

    @media (max-width: 540px) {
      .login-card { padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="grain"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">⚡</div>
        <span class="login-logo-text">Isinet</span>
        <span class="login-logo-sub">Soluciones Informáticas</span>
      </div>

      <h1 class="login-title">Panel de Administración</h1>

      <form id="login-form" class="login-form" novalidate="">
        <div class="form-group">
          <label for="login-email" class="form-label">Correo electrónico</label>
          <input type="email" id="login-email" name="email" class="form-input" placeholder="admin@isinet.cl" required="" autocomplete="email" value="example@gmail.com">
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Contraseña</label>
          <input type="password" id="login-password" name="password" class="form-input" placeholder="••••••••" required="" autocomplete="current-password" value="password123">
        </div>
        <div class="form-error" id="login-error" role="alert" aria-live="polite" style="display: block;">Invalid login credentials</div>
        <button type="submit" class="btn btn-primary btn-full" id="login-submit">Iniciar Sesión</button>
      </form>

      <p class="login-footer">
        <a href="../index.html">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Volver al sitio
        </a>
      </p>
    </div>
  </div>

  <script>
  (function () {
    "use strict";
    localStorage.removeItem("isinet-admin-session");
    var form = document.getElementById("login-form");
    var errorEl = document.getElementById("login-error");
    var submitBtn = document.getElementById("login-submit");
    if (!form) return;
    form.addEventListener("submit", function (e) {
      e.preventDefault();
      e.stopPropagation();
      var email = document.getElementById("login-email").value.trim();
      var password = document.getElementById("login-password").value;
      if (!email) { showError("Ingresa tu correo electrónico"); return; }
      if (!password) { showError("Ingresa tu contraseña"); return; }
      submitBtn.disabled = true;
      submitBtn.textContent = "Conectando...";
      errorEl.style.display = "none";
      fetch(window.location.origin + "/api/auth/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: email, password: password })
      })
      .then(function (r) { return r.json().then(function (d) { if (!r.ok) throw new Error(d.error); return d; }); })
      .then(function (data) {
        localStorage.setItem("isinet-admin-session", JSON.stringify({ token: data.token, user: data.user, expiresAt: Date.now() + 86400000 }));
        submitBtn.textContent = "Acceso concedido";
        submitBtn.style.background = "#22c55e";
        setTimeout(function () { window.location.href = "/admin/dashboard.html"; }, 500);
      })
      .catch(function (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = "Iniciar Sesión";
        errorEl.textContent = err.message || "Error";
        errorEl.style.display = "block";
      });
      return false;
    });
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
      submitBtn.disabled = false;
      submitBtn.textContent = "Iniciar Sesión";
    }
  })();
  </script>


</body></html>
