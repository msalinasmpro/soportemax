<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview de Video Hero — Isinet</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Space Grotesk', sans-serif; background: #0a0a0f; color: #fff; }
    .hero-preview { position: relative; width: 100%; height: 100vh; overflow: hidden; }
    .hero-slide { position: absolute; inset: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
    .hero-slide.active { opacity: 1; }
    .hero-slide img { width: 100%; height: 100%; object-fit: cover; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,10,15,0.3) 0%, rgba(10,10,15,0.7) 100%); }
    .hero-content { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); text-align: center; z-index: 2; }
    .hero-content h1 { font-size: 3rem; letter-spacing: -0.03em; margin-bottom: 10px; }
    .hero-content p { color: #a0a0a0; }
    .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 10px; }
    .controls button { padding: 10px 20px; background: rgba(74,144,217,0.2); border: 1px solid rgba(74,144,217,0.3); color: #fff; border-radius: 8px; cursor: pointer; font-family: inherit; }
    .controls button:hover { background: rgba(74,144,217,0.4); }
    .controls .active { background: rgba(74,144,217,0.6); }
    .info { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="info">Slideshow automático — cada 6.5 segundos cambia la imagen</div>
  <div class="hero-preview">
    <div class="hero-slide active"><img src="assets/img/cameras-app.webp" alt="Cámaras"></div>
    <div class="hero-slide"><img src="assets/img/electronics.webp" alt="Electrónica"></div>
    <div class="hero-slide"><img src="assets/img/lab-1.webp" alt="Laboratorio"></div>
    <div class="hero-slide"><img src="assets/img/office-tech.webp" alt="Oficina tech"></div>
    <div class="hero-slide"><img src="assets/img/repair-1.webp" alt="Reparación"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1>Isinet Soluciones Informáticas</h1>
      <p>Soporte Técnico Profesional</p>
    </div>
  </div>
  <div class="controls">
    <button onclick="prev()">← Anterior</button>
    <button onclick="toggleAuto()" id="autoBtn">⏸ Pausar</button>
    <button onclick="next()">Siguiente →</button>
  </div>

  <script>
    var slides = document.querySelectorAll('.hero-slide');
    var current = 0;
    var auto = true;
    var interval;

    function showSlide(n) {
      slides[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
    }

    function next() { showSlide(current + 1); }
    function prev() { showSlide(current - 1); }

    function toggleAuto() {
      auto = !auto;
      document.getElementById('autoBtn').textContent = auto ? '⏸ Pausar' : '▶ Auto';
      if (auto) startAuto();
      else clearInterval(interval);
    }

    function startAuto() {
      clearInterval(interval);
      interval = setInterval(function() { next(); }, 6500);
    }

    startAuto();
  </script>
</body>
</html>
