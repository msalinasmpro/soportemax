<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoporteMax — Dashboard</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css?v=20260630">
</head>
<body>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="sidebar-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">SoporteMax</span>
      </a>
      <button class="sidebar-close" id="sidebar-close" aria-label="Cerrar menú">✕</button>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="sidebar-link active" data-section="general">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        General
      </a>
      <a href="#" class="sidebar-link" data-section="services">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
        Servicios
      </a>
      <a href="#" class="sidebar-link" data-section="testimonials">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Testimonios
      </a>
      <a href="#" class="sidebar-link" data-section="faq">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        FAQ
      </a>
      <a href="#" class="sidebar-link" data-section="gallery">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Galería
      </a>
      <a href="#" class="sidebar-link" data-section="contact-config">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Contacto
      </a>
      <a href="#" class="sidebar-link" data-section="seo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        SEO
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="main-header">
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="header-info">
        <h1 class="header-title" id="section-title">Configuración General</h1>
        <p class="header-subtitle">Administra la información de tu sitio</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" id="btn-save" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          Guardar
        </button>
      </div>
    </header>

    <div class="content-area">

      <!-- General Section -->
      <div class="panel-section active" id="section-general">
        <div class="panel-grid">
          <div class="panel-field">
            <label class="field-label">Nombre de la Empresa</label>
            <input type="text" class="field-input" id="cfg-name" data-key="company_name" placeholder="SoporteMax">
          </div>
          <div class="panel-field">
            <label class="field-label">Teléfono</label>
            <input type="tel" class="field-input" id="cfg-phone" data-key="phone" placeholder="+56 9 1234 5678">
          </div>
          <div class="panel-field">
            <label class="field-label">Email</label>
            <input type="email" class="field-input" id="cfg-email" data-key="email" placeholder="contacto@soportemax.cl">
          </div>
          <div class="panel-field">
            <label class="field-label">WhatsApp</label>
            <input type="tel" class="field-input" id="cfg-whatsapp" data-key="whatsapp" placeholder="+56912345678">
          </div>
          <div class="panel-field panel-field-full">
            <label class="field-label">Dirección</label>
            <input type="text" class="field-input" id="cfg-address" data-key="address" placeholder="Av. Tecnología 1234, Santiago, Chile">
          </div>
          <div class="panel-field panel-field-full">
            <label class="field-label">Descripción</label>
            <textarea class="field-input field-textarea" id="cfg-description" data-key="description" rows="3" placeholder="Descripción de la empresa..."></textarea>
          </div>
          <div class="panel-field panel-field-full">
            <label class="field-label">Horario</label>
            <input type="text" class="field-input" id="cfg-hours" data-key="hours" placeholder="Lun-Vie: 9:00-18:00 | Sáb: 9:00-14:00">
          </div>
          <div class="panel-field">
            <label class="field-label">Latitud (Google Maps)</label>
            <input type="number" step="any" class="field-input" id="cfg-lat" data-key="map_lat" placeholder="-33.4489">
          </div>
          <div class="panel-field">
            <label class="field-label">Longitud (Google Maps)</label>
            <input type="number" step="any" class="field-input" id="cfg-lng" data-key="map_lng" placeholder="-70.6693">
          </div>
        </div>
        <div class="panel-section-title">Redes Sociales</div>
        <div class="panel-grid">
          <div class="panel-field">
            <label class="field-label">Facebook</label>
            <input type="url" class="field-input" id="cfg-facebook" data-key="social_facebook" placeholder="https://facebook.com/...">
          </div>
          <div class="panel-field">
            <label class="field-label">Instagram</label>
            <input type="url" class="field-input" id="cfg-instagram" data-key="social_instagram" placeholder="https://instagram.com/...">
          </div>
          <div class="panel-field">
            <label class="field-label">LinkedIn</label>
            <input type="url" class="field-input" id="cfg-linkedin" data-key="social_linkedin" placeholder="https://linkedin.com/company/...">
          </div>
          <div class="panel-field">
            <label class="field-label">YouTube</label>
            <input type="url" class="field-input" id="cfg-youtube" data-key="social_youtube" placeholder="https://youtube.com/@...">
          </div>
        </div>
      </div>

      <!-- Services Section -->
      <div class="panel-section" id="section-services">
        <div class="panel-section-header">
          <h2>Servicios</h2>
          <button class="btn btn-small" id="btn-add-service">+ Agregar Servicio</button>
        </div>
        <div class="panel-list" id="services-list"></div>
      </div>

      <!-- Testimonials Section -->
      <div class="panel-section" id="section-testimonials">
        <div class="panel-section-header">
          <h2>Testimonios</h2>
          <button class="btn btn-small" id="btn-add-testimonial">+ Agregar Testimonio</button>
        </div>
        <div class="panel-list" id="testimonials-list"></div>
      </div>

      <!-- FAQ Section -->
      <div class="panel-section" id="section-faq">
        <div class="panel-section-header">
          <h2>Preguntas Frecuentes</h2>
          <button class="btn btn-small" id="btn-add-faq">+ Agregar Pregunta</button>
        </div>
        <div class="panel-list" id="faq-list"></div>
      </div>

      <!-- Gallery Section -->
      <div class="panel-section" id="section-gallery">
        <div class="panel-section-header">
          <h2>Galería de Imágenes</h2>
        </div>
        <div class="gallery-upload">
          <label class="upload-area" id="upload-area">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span>Arrastra imágenes o haz clic para subir</span>
            <input type="file" id="gallery-upload" accept="image/*" multiple hidden>
          </label>
        </div>
        <div class="gallery-grid-admin" id="gallery-grid"></div>
      </div>

      <!-- Contact Config Section -->
      <div class="panel-section" id="section-contact-config">
        <div class="panel-section-header">
          <h2>Mensajes de Contacto</h2>
        </div>
        <div class="panel-list" id="messages-list"></div>
      </div>

      <!-- SEO Section -->
      <div class="panel-section" id="section-seo">
        <div class="panel-section-header">
          <h2>SEO & Meta Tags</h2>
        </div>
        <div class="panel-grid">
          <div class="panel-field panel-field-full">
            <label class="field-label">Meta Title</label>
            <input type="text" class="field-input" id="cfg-seo-title" data-key="seo_title" placeholder="SoporteMax — Soporte Técnico Profesional">
          </div>
          <div class="panel-field panel-field-full">
            <label class="field-label">Meta Description</label>
            <textarea class="field-input field-textarea" id="cfg-seo-desc" data-key="seo_description" rows="3" placeholder="Descripción para buscadores..."></textarea>
          </div>
          <div class="panel-field panel-field-full">
            <label class="field-label">OG Image URL</label>
            <input type="url" class="field-input" id="cfg-og-image" data-key="og_image" placeholder="https://soportemax.cl/assets/img/hero-lab.jpg">
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="alert" aria-live="polite"></div>

  <!-- Scripts -->
  <script defer src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script defer src="dashboard.js?v=20260630"></script>

</body>
</html>
