<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoporteMax — Panel de Administración</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css?v=20260630">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">SoporteMax</span>
      </div>
      <h1 class="login-title">Panel de Administración</h1>
      <p class="login-subtitle">Ingresa tus credenciales para acceder</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-group">
          <label for="login-email" class="form-label">Correo electrónico</label>
          <input type="email" id="login-email" name="email" class="form-input" placeholder="admin@soportemax.cl" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password" class="form-label">Contraseña</label>
          <input type="password" id="login-password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <div class="form-error" id="login-error" role="alert" aria-live="polite"></div>
        <button type="submit" class="btn btn-primary btn-full" id="login-submit">
          <span class="btn-text">Iniciar Sesión</span>
          <span class="btn-loading" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg>
          </span>
        </button>
      </form>

      <p class="login-footer">
        <a href="../index.html">← Volver al sitio</a>
      </p>
    </div>
  </div>
  <script defer src="login.js?v=20260630"></script>
</body>
</html>
