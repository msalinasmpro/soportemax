<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 580" width="512" height="580">
  <defs>
    <radialGradient id="globe" cx="50%" cy="42%" r="50%" fx="56%" fy="32%">
      <stop offset="0%" stop-color="#64d2ff"/>
      <stop offset="18%" stop-color="#42b4f5"/>
      <stop offset="38%" stop-color="#2196f3"/>
      <stop offset="58%" stop-color="#1976d2"/>
      <stop offset="78%" stop-color="#1565c0"/>
      <stop offset="100%" stop-color="#0d47a1"/>
    </radialGradient>
    <radialGradient id="gloss" cx="58%" cy="28%" r="38%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="45%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="nodeLit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#b3e5fc"/>
      <stop offset="100%" stop-color="#4fc3f7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rimLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.05)"/>
    </linearGradient>
    <clipPath id="gc">
      <circle cx="256" cy="218" r="158"/>
    </clipPath>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Globe shadow -->
  <ellipse cx="256" cy="385" rx="110" ry="12" fill="rgba(0,0,0,0.06)"/>

  <!-- Globe base -->
  <circle cx="256" cy="218" r="158" fill="url(#globe)"/>

  <!-- Latitude lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#90caf9" stroke-width="0.9" opacity="0.28">
    <ellipse cx="256" cy="218" rx="158" ry="22"/>
    <ellipse cx="256" cy="178" rx="148" ry="20"/>
    <ellipse cx="256" cy="258" rx="148" ry="20"/>
    <ellipse cx="256" cy="143" rx="128" ry="16"/>
    <ellipse cx="256" cy="293" rx="128" ry="16"/>
    <ellipse cx="256" cy="115" rx="100" ry="13"/>
    <ellipse cx="256" cy="321" rx="100" ry="13"/>
    <ellipse cx="256" cy="95" rx="68" ry="10"/>
    <ellipse cx="256" cy="341" rx="68" ry="10"/>
  </g>

  <!-- Longitude lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#90caf9" stroke-width="0.9" opacity="0.28">
    <ellipse cx="256" cy="218" rx="22" ry="158"/>
    <ellipse cx="256" cy="218" rx="60" ry="158"/>
    <ellipse cx="256" cy="218" rx="100" ry="158"/>
    <ellipse cx="256" cy="218" rx="135" ry="158"/>
  </g>

  <!-- Diagonal network lines -->
  <g clip-path="url(#gc)" fill="none" stroke="#64b5f6" stroke-width="0.7" opacity="0.2">
    <line x1="105" y1="135" x2="407" y2="301"/>
    <line x1="115" y1="301" x2="397" y2="135"/>
    <line x1="100" y1="195" x2="412" y2="241"/>
    <line x1="155" y1="95" x2="357" y2="341"/>
    <line x1="200" y1="82" x2="312" y2="354"/>
    <line x1="130" y1="245" x2="382" y2="191"/>
  </g>

  <!-- Fine connection network -->
  <g clip-path="url(#gc)" fill="none" stroke="rgba(144,202,249,0.5)" stroke-width="0.6" opacity="0.45">
    <line x1="185" y1="155" x2="256" y2="178"/>
    <line x1="256" y1="178" x2="325" y2="143"/>
    <line x1="170" y1="218" x2="256" y2="178"/>
    <line x1="256" y1="178" x2="340" y2="205"/>
    <line x1="340" y1="205" x2="375" y2="168"/>
    <line x1="170" y1="218" x2="190" y2="285"/>
    <line x1="190" y1="285" x2="256" y2="325"/>
    <line x1="285" y1="265" x2="340" y2="205"/>
    <line x1="285" y1="265" x2="325" y2="295"/>
    <line x1="185" y1="155" x2="135" y2="190"/>
    <line x1="325" y1="143" x2="375" y2="168"/>
    <line x1="190" y1="285" x2="155" y2="255"/>
    <line x1="325" y1="295" x2="355" y2="255"/>
    <line x1="220" y1="125" x2="185" y2="155"/>
    <line x1="220" y1="125" x2="325" y2="143"/>
    <line x1="275" y1="305" x2="285" y2="265"/>
    <line x1="155" y1="255" x2="135" y2="190"/>
    <line x1="355" y1="255" x2="340" y2="205"/>
    <line x1="256" y1="105" x2="220" y2="125"/>
    <line x1="256" y1="105" x2="325" y2="143"/>
    <line x1="256" y1="330" x2="275" y2="305"/>
    <line x1="256" y1="330" x2="190" y2="285"/>
  </g>

  <!-- Network nodes with glow -->
  <g clip-path="url(#gc)" filter="url(#softGlow)">
    <circle cx="256" cy="178" r="5" fill="url(#nodeLit)"/>
    <circle cx="185" cy="155" r="4.5" fill="url(#nodeLit)"/>
    <circle cx="325" cy="143" r="4.5" fill="url(#nodeLit)"/>
    <circle cx="170" cy="218" r="4" fill="url(#nodeLit)"/>
    <circle cx="340" cy="205" r="5" fill="url(#nodeLit)"/>
    <circle cx="375" cy="168" r="3.5" fill="url(#nodeLit)"/>
    <circle cx="135" cy="190" r="3" fill="url(#nodeLit)"/>
    <circle cx="285" cy="265" r="4.5" fill="url(#nodeLit)"/>
    <circle cx="190" cy="285" r="4" fill="url(#nodeLit)"/>
    <circle cx="355" cy="255" r="3.5" fill="url(#nodeLit)"/>
    <circle cx="155" cy="255" r="3.5" fill="url(#nodeLit)"/>
    <circle cx="220" cy="125" r="3.5" fill="url(#nodeLit)"/>
    <circle cx="275" cy="305" r="3" fill="url(#nodeLit)"/>
    <circle cx="325" cy="295" r="3" fill="url(#nodeLit)"/>
    <circle cx="256" cy="325" r="2.5" fill="url(#nodeLit)"/>
    <circle cx="115" cy="165" r="2.5" fill="url(#nodeLit)"/>
    <circle cx="385" cy="225" r="2.5" fill="url(#nodeLit)"/>
    <circle cx="205" cy="315" r="2.5" fill="url(#nodeLit)"/>
    <circle cx="256" cy="105" r="3" fill="url(#nodeLit)"/>
  </g>

  <!-- Gloss overlay -->
  <circle cx="256" cy="218" r="158" fill="url(#gloss)"/>

  <!-- Bright specular highlight -->
  <ellipse cx="305" cy="155" rx="38" ry="26" fill="rgba(255,255,255,0.3)" transform="rotate(-18 305 155)"/>
  <ellipse cx="315" cy="145" rx="18" ry="12" fill="rgba(255,255,255,0.2)" transform="rotate(-18 315 145)"/>

  <!-- Globe rim -->
  <circle cx="256" cy="218" r="158" fill="none" stroke="url(#rimLight)" stroke-width="1.5"/>

  <!-- ISINET -->
  <text x="256" y="445" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="70" font-weight="700" letter-spacing="12" fill="#1565c0">ISINET</text>

  <!-- Soluciones Informáticas -->
  <text x="256" y="483" text-anchor="middle" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="21" font-weight="400" letter-spacing="2.5" fill="#42a5f5">Soluciones Informáticas</text>
</svg>
